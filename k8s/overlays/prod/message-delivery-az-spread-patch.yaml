# Zone spread for message-delivery (prod). Spot: scheduling.messenger/spot + spot-patch.yaml.
#
# Goal:
#   - HA: delivery must run in at least two AZs (minDomains: 2). A single-AZ layout is never allowed.
#   - Scale: extra replicas may share an AZ as long as another AZ also has at least one pod.
#   - Rollouts: matchLabelKeys lets old and new pods share an AZ briefly during rolling updates.
#   - DoNotSchedule: pod stays Pending if only single-AZ placement is possible (CA can scale the other zone).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-delivery-deployment
spec:
  template:
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: message-delivery
          matchLabelKeys:
            - pod-template-hash
