# Production hostnames. Replacements in kustomization.yaml map these onto ingress rules.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-hosts
data:
  app: app.messenger.rgonzalez.xyz
  api: api.messenger.rgonzalez.xyz
  ws: ws.messenger.rgonzalez.xyz
  kafka: kafka.messenger.rgonzalez.xyz
  mongo: mongo.messenger.rgonzalez.xyz
  grafana: grafana.messenger.rgonzalez.xyz
  # Browser origin for public-api CORS (scheme + host; must match where the frontend is served).
  cors_origin: http://app.messenger.rgonzalez.xyz
