# Spread replicas across AZs so a single zone outage does not take out all pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-api-deployment
spec:
  template:
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: public-api-service
              topologyKey: topology.kubernetes.io/zone
