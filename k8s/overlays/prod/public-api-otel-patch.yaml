# Prod observability: environment label and lower trace sampling than local (1.0).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-api-deployment
spec:
  template:
    spec:
      containers:
        - name: public-api-container
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=prod
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
