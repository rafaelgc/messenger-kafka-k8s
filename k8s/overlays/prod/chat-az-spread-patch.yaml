# Spread replicas across AZs so a single zone outage does not take out all pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-deployment
spec:
  template:
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: chat
          matchLabelKeys:
            - pod-template-hash
