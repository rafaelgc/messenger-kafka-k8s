# Local dev (Docker Desktop / kind) with ingress-nginx.
#
# Install the controller once:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.3/deploy/static/provider/cloud/deploy.yaml
#   kubectl wait --namespace ingress-nginx --for=condition=ready pod -l app.kubernetes.io/component=controller --timeout=120s
#
# Apply:
#   kubectl apply -k k8s/overlays/local
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: ingress-patch.yaml
  - path: grafana-ingress-patch.yaml
