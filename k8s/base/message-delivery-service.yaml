---
# Message Delivery
apiVersion: v1
kind: Service
metadata:
  name: message-delivery
spec:
  selector:
    app.kubernetes.io/name: message-delivery
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-delivery-deployment
  labels:
    scheduling.messenger/spot: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: message-delivery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: message-delivery
    spec:
      containers:
        - name: message-delivery-container
          image: message-delivery:latest
          ports:
            - containerPort: 8081
          env:
            - name: RUST_LOG
              value: info
            - name: KAFKA_BROKERS
              value: kafka:9092
            # One consumer group per pod so every replica reads all message.sent events and
            # delivers only to WebSocket connections on this pod (shared group would split partitions).
            - name: KAFKA_CONSUMER_GROUP
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DELIVERY_BIND_ADDR
              value: 0.0.0.0:8081
            - name: JWT_SECRET
              value: dev-jwt-secret-change-in-production
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_SERVICE_NAME
              value: message-delivery
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            # Local/dev default; prod overlay patches deployment.environment=prod.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=local
            - name: OTEL_TRACES_SAMPLER
              value: parentbased_traceidratio
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
