---
# Message Delivery
apiVersion: v1
kind: Service
metadata:
  name: message-delivery
spec:
  selector:
    app.kubernetes.io/name: message-delivery
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-delivery-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: message-delivery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: message-delivery
    spec:
      containers:
        - name: message-delivery-container
          image: message-delivery:latest
          ports:
            - containerPort: 8081
          env:
            - name: RUST_LOG
              value: info
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: KAFKA_CONSUMER_GROUP
              value: message-delivery
            - name: DELIVERY_BIND_ADDR
              value: 0.0.0.0:8081
            - name: JWT_SECRET
              value: dev-jwt-secret-change-in-production
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
