# Message storage connects to the sharded cluster via mongos (see message-storage-service-mongo.yaml).
---
apiVersion: v1
kind: Secret
metadata:
  name: message-storage-mongodb
type: Opaque
stringData:
  # Credentials must match admin-user in the mongodb-operator namespace.
  uri: mongodb://admin:admin123@mongodb-mongos.mongodb-operator.svc.cluster.local:27017/messaging?authSource=admin
---
apiVersion: v1
kind: Service
metadata:
  name: message-storage
spec:
  selector:
    app.kubernetes.io/name: message-storage
  ports:
    - protocol: TCP
      port: 8087
      targetPort: 8087
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-storage-deployment
  labels:
    scheduling.messenger/spot: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: message-storage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: message-storage
    spec:
      containers:
        - name: message-storage-container
          image: message-storage:latest
          ports:
            - containerPort: 8087
          env:
            - name: RUST_LOG
              value: info
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: KAFKA_CONSUMER_GROUP
              value: message-storage
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: message-storage-mongodb
                  key: uri
            - name: MONGODB_DATABASE
              value: messaging
            - name: STORAGE_BIND_ADDR
              value: 0.0.0.0:8087
            - name: OTEL_SERVICE_NAME
              value: message-storage
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            # Local/dev default; prod overlay patches deployment.environment=prod.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=local
            - name: OTEL_TRACES_SAMPLER
              value: parentbased_traceidratio
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
            - name: OTEL_RUST_INSTRUMENTATION_MONGODB_ENABLED
              value: "true"
