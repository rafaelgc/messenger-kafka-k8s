# Grafana UI — lives in observability namespace (not messaging Ingress; cross-namespace backends are not supported).
#
# Local: http://grafana.localhost
# Prod hostname: set in overlays/prod/hosts-configmap.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
spec:
  rules:
    - host: grafana.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
