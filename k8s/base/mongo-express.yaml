---
# Dev tooling — mongo-express (one UI for all MongoDB instances)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-express-config
data:
  # Mounted as config.default.js (not config.js) so the app loads this directly
  # without deepmerge — merging an array into the default mongodb object crashes.
  config.default.js: |
    export default {
      mongodb: [
        {
          connectionString: 'mongodb://admin:admin123@mongodb-mongos.mongodb-operator.svc.cluster.local:27017/messaging?authSource=admin',
          connectionName: 'storage',
          admin: true,
          connectionOptions: { maxPoolSize: 4 },
          whitelist: [],
          blacklist: [],
        },
        {
          connectionString: 'mongodb://admin:admin123@chat-mongodb-svc.mongodb-operator.svc.cluster.local:27017/chat?replicaSet=chat-mongodb&authSource=admin',
          connectionName: 'chat',
          admin: true,
          connectionOptions: { maxPoolSize: 4 },
          whitelist: [],
          blacklist: [],
        },
        {
          connectionString: 'mongodb://admin:admin123@users-mongodb-svc.mongodb-operator.svc.cluster.local:27017/users?replicaSet=users-mongodb&authSource=admin',
          connectionName: 'users',
          admin: true,
          connectionOptions: { maxPoolSize: 4 },
          whitelist: [],
          blacklist: [],
        },
      ],
      site: {
        baseUrl: '/',
        cookieKeyName: 'mongo-express',
        cookieSecret: 'dev-mongo-express-cookie',
        host: '0.0.0.0',
        port: 8081,
        requestSizeLimit: '50mb',
        sessionSecret: 'dev-mongo-express-session',
        sslCert: '',
        sslEnabled: false,
        sslKey: '',
      },
      healthCheck: { path: '/status' },
      useBasicAuth: false,
      basicAuth: { username: 'admin', password: 'pass' },
      options: {
        console: true,
        documentsPerPage: 10,
        editorTheme: 'rubyblue',
        maxPropSize: 100000,
        maxRowSize: 1000000,
        cmdType: 'eval',
        subprocessTimeout: 300,
        readOnly: false,
        persistEditMode: false,
        collapsibleJSON: true,
        collapsibleJSONDefaultUnfold: 1,
        gridFSEnabled: false,
        logger: {},
        confirmDelete: false,
        noExport: false,
        fullwidthLayout: false,
        noDelete: false,
      },
    };
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-express
spec:
  selector:
    app.kubernetes.io/name: mongo-express
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express-deployment
  labels:
    scheduling.messenger/spot: "true"
spec:
  replicas: 1
  # Recreate avoids two pods during rollout; subPath ConfigMap mounts do not hot-reload.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mongo-express
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongo-express
      annotations:
        config/revision: mongos-v1
    spec:
      containers:
        - name: mongo-express
          image: mongo-express:1.0.2-20
          ports:
            - containerPort: 8081
          env:
            - name: ME_CONFIG_BASICAUTH
              value: "false"
            # Entrypoint waits for this host before starting (default is mongo:27017).
            - name: ME_CONFIG_MONGODB_URL
              # [TODO][SECURITY] Review this hardcoded password.
              value: mongodb://admin:admin123@mongodb-mongos.mongodb-operator.svc.cluster.local:27017/admin?authSource=admin
            - name: ME_CONFIG_CONNECT_RETRIES
              value: "120"
            - name: VCAP_APP_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: config
              mountPath: /app/config.default.js
              subPath: config.default.js
          readinessProbe:
            httpGet:
              path: /status
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: mongo-express-config
