apiVersion: v1
kind: Secret
metadata:
  name: chat-mongodb-password
  namespace: mongodb-operator
type: Opaque
stringData:
  password: admin123 # [SECURITY][TODO] Production-grade: use ExternalSecrets.
---
apiVersion: v1
kind: Secret
metadata:
  name: chat-mongodb-uri
type: Opaque
stringData:
  uri: mongodb://admin:admin123@chat-mongodb-svc.mongodb-operator.svc.cluster.local:27017/chat?replicaSet=chat-mongodb&authSource=admin
---
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: chat-mongodb
  namespace: mongodb-operator
spec:
  members: 2
  type: ReplicaSet
  version: "8.0.0"
  users:
    - name: admin
      db: admin
      passwordSecretRef:
        name: chat-mongodb-password
      roles:
        - name: root
          db: admin
      scramCredentialsSecretName: chat-mongodb-scram
  security:
    authentication:
      modes:
        - SCRAM
  # Defaults are 500m+500m (=1 CPU/pod), which leaves ~700m free on a t4g.large
  # that already hosts another Mongo member — not enough for a second default pod.
  # These requests let chat-mongodb pack beside an existing member (~500m total).
  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: 250m
                  memory: 400M
                limits:
                  cpu: "1"
                  memory: 500M
            - name: mongodb-agent
              resources:
                requests:
                  cpu: 250m
                  memory: 400M
                limits:
                  cpu: "1"
                  memory: 500M
---
# Chat Service
apiVersion: v1
kind: Service
metadata:
  name: chat
spec:
  selector:
    app.kubernetes.io/name: chat
  ports:
    - protocol: TCP
      port: 8085
      targetPort: 8085
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-deployment
  labels:
    scheduling.messenger/spot: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chat
    spec:
      containers:
        - name: chat-container
          image: chat:latest
          ports:
            - containerPort: 8085
          # HTTP + Mongo (I/O-bound). Same ballpark as public-api; lighter than users/Argon2.
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
          env:
            - name: RUST_LOG
              value: info
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: chat-mongodb-uri
                  key: uri
            - name: MONGODB_DATABASE
              value: chat
            - name: CHAT_BIND_ADDR
              value: 0.0.0.0:8085
            - name: OTEL_SERVICE_NAME
              value: chat
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            # Local/dev default; prod overlay patches deployment.environment=prod.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=local
            - name: OTEL_TRACES_SAMPLER
              value: parentbased_traceidratio
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
            - name: OTEL_RUST_INSTRUMENTATION_MONGODB_ENABLED
              value: "true"
