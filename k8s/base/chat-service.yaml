---
# Chat MongoDB
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chat-mongodb-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: chat-mongodb
spec:
  selector:
    app.kubernetes.io/name: chat-mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chat-mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chat-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: chat
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chat-mongodb-data
---
# Chat Service
apiVersion: v1
kind: Service
metadata:
  name: chat
spec:
  selector:
    app.kubernetes.io/name: chat
  ports:
    - protocol: TCP
      port: 8085
      targetPort: 8085
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-deployment
  labels:
    scheduling.messenger/spot: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chat
    spec:
      containers:
        - name: chat-container
          image: chat:latest
          ports:
            - containerPort: 8085
          env:
            - name: RUST_LOG
              value: info
            - name: MONGODB_URI
              value: mongodb://chat-mongodb:27017
            - name: MONGODB_DATABASE
              value: chat
            - name: CHAT_BIND_ADDR
              value: 0.0.0.0:8085
            - name: OTEL_SERVICE_NAME
              value: chat
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            # Local/dev default; prod overlay patches deployment.environment=prod.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=local
            - name: OTEL_TRACES_SAMPLER
              value: parentbased_traceidratio
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
            - name: OTEL_RUST_INSTRUMENTATION_MONGODB_ENABLED
              value: "true"
