apiVersion: v1
kind: Secret
metadata:
  name: users-mongodb-password
  namespace: mongodb-operator
type: Opaque
stringData:
  password: admin123 # [SECURITY][TODO] Production-grade: use ExternalSecrets.
---
apiVersion: v1
kind: Secret
metadata:
  name: users-mongodb-uri
type: Opaque
stringData:
  uri: mongodb://admin:admin123@users-mongodb-svc.mongodb-operator.svc.cluster.local:27017/users?replicaSet=users-mongodb&authSource=admin
---
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: users-mongodb
  namespace: mongodb-operator
spec:
  members: 2
  type: ReplicaSet
  version: "8.0.0"
  users:
    - name: admin
      db: admin
      passwordSecretRef:
        name: users-mongodb-password
      roles:
        - name: root
          db: admin
      scramCredentialsSecretName: users-mongodb-scram
  security:
    authentication:
      modes:
        - SCRAM
  # Defaults are 500m+500m (=1 CPU/pod), which leaves ~700m free on a t4g.large
  # that already hosts another Mongo member — not enough for a second default pod.
  # These requests let users-mongodb pack beside an existing member (~500m total).
  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: 250m
                  memory: 400M
                limits:
                  cpu: "1"
                  memory: 500M
            - name: mongodb-agent
              resources:
                requests:
                  cpu: 250m
                  memory: 400M
                limits:
                  cpu: "1"
                  memory: 500M
---
# Users Service
apiVersion: v1
kind: Service
metadata:
  name: users
spec:
  selector:
    app.kubernetes.io/name: users
  ports:
    - protocol: TCP
      port: 8088
      targetPort: 8088
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-deployment
  labels:
    scheduling.messenger/spot: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: users
  template:
    metadata:
      labels:
        app.kubernetes.io/name: users
    spec:
      containers:
        - name: users-container
          image: users:latest
          ports:
            - containerPort: 8088
          env:
            - name: RUST_LOG
              value: info
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: users-mongodb-uri
                  key: uri
            - name: MONGODB_DATABASE
              value: users
            - name: USERS_BIND_ADDR
              value: 0.0.0.0:8088
            - name: JWT_SECRET
              value: dev-jwt-secret-change-in-production
            - name: OTEL_SERVICE_NAME
              value: users
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            # Local/dev default; prod overlay patches deployment.environment=prod.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=local
            - name: OTEL_TRACES_SAMPLER
              value: parentbased_traceidratio
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
            - name: OTEL_RUST_INSTRUMENTATION_MONGODB_ENABLED
              value: "true"
