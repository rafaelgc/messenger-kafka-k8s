---
# Users MongoDB
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: users-mongodb-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: users-mongodb
spec:
  selector:
    app.kubernetes.io/name: users-mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-mongodb
spec:
  replicas: 1 # [TODO] Use MongoDBCommunity with proper replication.
  selector:
    matchLabels:
      app.kubernetes.io/name: users-mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: users-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: users
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: users-mongodb-data
---
# Users Service
apiVersion: v1
kind: Service
metadata:
  name: users
spec:
  selector:
    app.kubernetes.io/name: users
  ports:
    - protocol: TCP
      port: 8088
      targetPort: 8088
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-deployment
  labels:
    scheduling.messenger/spot: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: users
  template:
    metadata:
      labels:
        app.kubernetes.io/name: users
    spec:
      containers:
        - name: users-container
          image: users:latest
          ports:
            - containerPort: 8088
          env:
            - name: RUST_LOG
              value: info
            - name: MONGODB_URI
              value: mongodb://users-mongodb:27017
            - name: MONGODB_DATABASE
              value: users
            - name: USERS_BIND_ADDR
              value: 0.0.0.0:8088
            - name: JWT_SECRET
              value: dev-jwt-secret-change-in-production
