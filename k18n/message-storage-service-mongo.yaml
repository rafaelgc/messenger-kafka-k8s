# Keyfile secrets (internal cluster authentication)
#
# What: A keyfile is a shared secret that lets MongoDB processes trust each other.
#       Config servers, shards, and mongos must all use the SAME keyfile content so
#       they can communicate inside the sharded cluster (separate from SCRAM client
#       login — that is admin-user above).
#
# Why three secrets with identical content: The Community operator looks up a secret
# named "{MongoDBCommunity.metadata.name}-keyfile" automatically — it is NOT
# referenced in the CR spec below. We cannot use one secret for all CRs because each
# CR name maps to a different secret name. mongos mounts mongodb-config-keyfile
# explicitly (see Deployment mongodb-mongos).
#
# If these secrets are missing at first deploy, the operator generates a random
# keyfile per CR, which breaks sharding. Create them before the MongoDBCommunity CRs.
#
# Key format (MongoDB requirement): 6–1024 chars, base64 alphabet [A-Za-z0-9+/].
# The value below is dev-only file CONTENT (not a filename). Generate for prod with:
#   openssl rand -base64 756
#
# Secret key "keyfile" is the filename when mounted (e.g. /etc/mongodb-keyfile/keyfile).
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-0-keyfile # operator auto-mounts for CR metadata.name mongodb-0
  namespace: mongodb
type: Opaque
stringData:
  keyfile: messaging-dev-shared-keyfile-9Kx2mP4vL8nQ6wR3yT1zA5bC7dE0fG4hJ6kM2nP8q # [SECURITY][TODO] Review this.
---
apiVersion: v1
kind: Secret
