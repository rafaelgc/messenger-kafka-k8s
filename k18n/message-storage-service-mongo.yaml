  namespace: mongodb
type: Opaque
stringData:
  keyfile: messaging-dev-shared-keyfile-9Kx2mP4vL8nQ6wR3yT1zA5bC7dE0fG4hJ6kM2nP8q
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-config-keyfile # operator auto-mounts for CR mongodb-config; also used by mongos
  namespace: mongodb
type: Opaque
