---
# Storage MongoDB
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-mongodb-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: storage-mongodb
spec:
  selector:
    app.kubernetes.io/name: storage-mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: storage-mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: storage-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: messaging
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: storage-mongodb-data
---
# Message Storage
apiVersion: v1
kind: Service
metadata:
  name: message-storage
spec:
  selector:
    app.kubernetes.io/name: message-storage
  ports:
    - protocol: TCP
      port: 8087
      targetPort: 8087
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-storage-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: message-storage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: message-storage
    spec:
      containers:
        - name: message-storage-container
          image: message-storage:latest
          ports:
            - containerPort: 8087
          env:
            - name: RUST_LOG
              value: info
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: KAFKA_CONSUMER_GROUP
              value: message-storage
            - name: MONGODB_URI
              value: mongodb://storage-mongodb:27017
            - name: MONGODB_DATABASE
              value: messaging
            - name: STORAGE_BIND_ADDR
              value: 0.0.0.0:8087
