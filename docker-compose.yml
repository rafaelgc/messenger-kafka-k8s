  #   depends_on:
  #     kafka:
  #       condition: service_healthy
  #     kafka-init:
  #       condition: service_completed_successfully
  #     push-mongodb:
  #       condition: service_healthy
  #   environment:
  #     RUST_LOG: info
  #     KAFKA_BROKERS: kafka:9092
  #     KAFKA_CONSUMER_GROUP: message-push
  #     MONGODB_URI: mongodb://push-mongodb:27017
  #     MONGODB_DATABASE: push
  #     MONGODB_PUSH_TOKENS_COLLECTION: push_tokens
  #     PUSH_CONNECTOR: dummy
  #   volumes:
  #     - ./services/message-push:/app
  #     - message_push_target:/app/target
  #     - cargo_registry:/usr/local/cargo/registry
  #     - cargo_git:/usr/local/cargo/git
  #   networks:
  #     - messaging

  # ---------------------------------------------------------------------------
  # Dev / debug tools
  # Web UIs for local development — not required in production.
  # ---------------------------------------------------------------------------

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: messaging-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - messaging

  storage-mongo-express:
    image: mongo-express:1.0.2-20
    container_name: messaging-storage-mongo-express
    depends_on:
      storage-mongodb:
        condition: service_healthy
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://storage-mongodb:27017
      ME_CONFIG_BASENAME: /
      ME_CONFIG_BASICAUTH: "false"
    networks:
      - messaging


  # push-mongo-express:
