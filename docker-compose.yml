name: messaging

x-rust-dev-image: &rust-dev-image
  image: messaging-rust-dev
  build:
    context: ./services
    dockerfile: Dockerfile.dev

services:
  # ---------------------------------------------------------------------------
  # Shared infrastructure
  # ---------------------------------------------------------------------------

  kafka:
    image: soldevelo/kafka:3.9
    container_name: messaging-kafka
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@localhost:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - messaging

  # One-shot init container (not a second broker). Creates the message.sent topic
  # after Kafka is healthy, then exits. Apps wait for this before starting.
  kafka-init:
    image: soldevelo/kafka:3.9
    container_name: messaging-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics.sh --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic message.sent \
          --partitions 3 \
          --replication-factor 1
    restart: "no"
    networks:
      - messaging

  # ---------------------------------------------------------------------------
  # Public API
  # ---------------------------------------------------------------------------

  public-api:
    <<: *rust-dev-image
    container_name: messaging-public-api
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      chat:
        condition: service_started
      message-storage:
        condition: service_started
      users:
        condition: service_started
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: kafka:9092
      PUBLIC_API_BIND_ADDR: 0.0.0.0:8080
      CHAT_SERVICE_URL: http://chat:8085
      STORAGE_SERVICE_URL: http://message-storage:8087
      USERS_SERVICE_URL: http://users:8088
      JWT_SECRET: dev-jwt-secret-change-in-production
      CORS_ALLOWED_ORIGIN: http://localhost:3000
    volumes:
      - ./services/public-api:/app
      - public_api_target:/app/target
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
    ports:
      - "8080:8080"
    networks:
      - messaging

  # ---------------------------------------------------------------------------
  # Frontend (Next.js)
  # ---------------------------------------------------------------------------

  frontend:
    image: node:22.15.0-alpine
    container_name: messaging-frontend
    working_dir: /app
    command: npm run dev
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - messaging

  # ---------------------------------------------------------------------------
  # Message Storage Service
  # ---------------------------------------------------------------------------

  storage-mongodb:
    image: mongo:7
    container_name: messaging-storage-mongodb
    environment:
      MONGO_INITDB_DATABASE: messaging
    ports:
      - "27017:27017"
    volumes:
      - storage_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - messaging

  message-storage:
    <<: *rust-dev-image
    container_name: messaging-message-storage
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      storage-mongodb:
        condition: service_healthy
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: message-storage
      MONGODB_URI: mongodb://storage-mongodb:27017
      MONGODB_DATABASE: messaging
      STORAGE_BIND_ADDR: 0.0.0.0:8087
    volumes:
      - ./services/message-storage:/app
      - message_storage_target:/app/target
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
    networks:
      - messaging

  # ---------------------------------------------------------------------------
  # Message Delivery Service
  # ---------------------------------------------------------------------------

  message-delivery:
    <<: *rust-dev-image
    container_name: messaging-message-delivery
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: message-delivery
      DELIVERY_BIND_ADDR: 0.0.0.0:8081
      JWT_SECRET: dev-jwt-secret-change-in-production
    volumes:
      - ./services/message-delivery:/app
      - message_delivery_target:/app/target
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
    ports:
      - "8081:8081"
    networks:
      - messaging

  # ---------------------------------------------------------------------------
  # Chat Service
  # ---------------------------------------------------------------------------

  chat-mongodb:
    image: mongo:7
    container_name: messaging-chat-mongodb
    environment:
      MONGO_INITDB_DATABASE: chat
    ports:
      - "27019:27017"
    volumes:
      - chat_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - messaging

  chat:
    <<: *rust-dev-image
    container_name: messaging-chat
    depends_on:
      chat-mongodb:
        condition: service_healthy
    environment:
      RUST_LOG: info
      MONGODB_URI: mongodb://chat-mongodb:27017
      MONGODB_DATABASE: chat
      CHAT_BIND_ADDR: 0.0.0.0:8085
    volumes:
      - ./services/chat:/app
      - chat_target:/app/target
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
    ports:
      - "8085:8085"
    networks:
      - messaging

  # ---------------------------------------------------------------------------
  # Users Service
  # ---------------------------------------------------------------------------

  users-mongodb:
    image: mongo:7
    container_name: messaging-users-mongodb
    environment:
      MONGO_INITDB_DATABASE: users
    ports:
      - "27020:27017"
    volumes:
      - users_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - messaging

  users:
    <<: *rust-dev-image
    container_name: messaging-users
    depends_on:
      users-mongodb:
        condition: service_healthy
    environment:
      RUST_LOG: info
      MONGODB_URI: mongodb://users-mongodb:27017
      MONGODB_DATABASE: users
      USERS_BIND_ADDR: 0.0.0.0:8088
      JWT_SECRET: dev-jwt-secret-change-in-production
    volumes:
      - ./services/users:/app
      - users_target:/app/target
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
    networks:
      - messaging

  # ---------------------------------------------------------------------------
  # Message Push Service
